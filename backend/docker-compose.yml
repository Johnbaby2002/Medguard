services:
  postgres:
    image: postgres:16
    container_name: medguard-postgres
    environment:
      POSTGRES_DB: medguard
      POSTGRES_USER: medguard
      POSTGRES_PASSWORD: medguard
    ports:
      - "5432:5432"
    volumes:
      - medguard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medguard -d medguard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  medguard-postgres-data:
