<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MedGuard Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand">
      <p class="eyebrow">Medication safety assistant</p>
      <h1>MedGuard</h1>
      <p>Create your account first. After registration, MedGuard will send you to the login page.</p>
      <p class="muted">Already registered? <a class="text-link" href="login.html">Login</a></p>
    </section>

    <section class="auth-panel">
      <article class="auth-card">
        <h2>Create account</h2>
        <p data-status class="status-line hidden"></p>
        <form data-endpoint="POST /auth/register">
          <section class="grid two">
            <label>Full name<input name="fullName" autocomplete="name" required></label>
            <label>Email<input name="email" type="email" autocomplete="email" required></label>
            <label>Age<input name="age" type="number" min="0" max="130" required></label>
            <label>Phone number<input name="phoneNumber" type="tel" autocomplete="tel"></label>
          </section>
          <label>Role
            <select name="role" required>
              <option value="patient">patient</option>
              <option value="caregiver">caregiver</option>
              <option value="clinician">clinician</option>
              <option value="admin">admin</option>
            </select>
          </label>
          <section class="grid two">
            <label>Password
              <span class="password-row">
                <input name="password" type="password" autocomplete="new-password" required>
                <button type="button" class="secondary tiny" data-toggle-password>Show</button>
              </span>
            </label>
            <label>Confirm password
              <span class="password-row">
                <input name="repeatPassword" type="password" autocomplete="new-password" required>
                <button type="button" class="secondary tiny" data-toggle-password>Show</button>
              </span>
            </label>
          </section>
          <p class="muted">Use at least 8 characters with uppercase, lowercase, and a special character.</p>
          <label class="check-row"><input name="termsConsent" type="checkbox" required> I agree to the terms and privacy policy.</label>
          <label class="check-row"><input name="medicalDisclaimerConsent" type="checkbox" required> I understand MedGuard does not replace a doctor or pharmacist.</label>
          <button type="button">Create account</button>
        </form>
      </article>
    </section>
  </main>
  <script src="app.js?v=7"></script>
</body>
</html>
