<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MedGuard Scan Intake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">MedGuard</div>
      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="medications.html">Medications</a>
        <a class="active" href="scans.html">Scan Intake</a>
        <a href="safety.html">Safety</a>
        <a href="emergency.html">Emergency Card</a>
        <a href="integrations.html">Integrations</a>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar"><h1>Scan Intake</h1></div>
      <section class="grid two">
        <article class="card">
          <h2>Camera capture</h2>
          <form data-camera-form="true">
            <label>Take photo or choose image<input name="cameraImage" type="file" accept="image/*" capture="environment"></label>
            <label>Notes<textarea name="notes"></textarea></label>
            <button type="button">Create camera draft</button>
          </form>
        </article>
        <article class="card">
          <h2>Upload image or PDF</h2>
          <form data-upload-form="true" enctype="multipart/form-data">
            <label>File<input name="file" type="file" accept="image/*,application/pdf"></label>
            <label>OCR text if available<textarea name="ocr_text"></textarea></label>
            <label>Notes<textarea name="notes"></textarea></label>
            <button type="button">Upload draft</button>
          </form>
        </article>
        <article class="card">
          <h2>Barcode draft</h2>
          <form data-endpoint="POST /scans/barcode">
            <label>Barcode<input name="barcode"></label>
            <label>Product name<input name="productName"></label>
            <label>Active ingredient<input name="activeIngredient"></label>
            <label>Dosage<input name="dosage"></label>
            <button type="button">Create draft</button>
          </form>
        </article>
        <article class="card">
          <h2>OCR draft</h2>
          <form data-endpoint="POST /scans/prescription-ocr">
            <label>OCR text<textarea name="ocrText"></textarea></label>
            <label>Image reference<input name="imageReference"></label>
            <button type="button">Create draft</button>
          </form>
        </article>
      </section>
      <article class="card" style="margin-top:16px">
        <h2>Scan drafts</h2>
        <table class="table" data-scan-table="true">
          <thead><tr><th>Type</th><th>Draft</th><th>Status</th><th>Action</th></tr></thead>
          <tbody><tr><td colspan="4" class="muted">Create a scan draft to see it here.</td></tr></tbody>
        </table>
      </article>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
