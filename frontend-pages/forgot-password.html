<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MedGuard Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand">
      <p class="eyebrow">Account recovery</p>
      <h1>MedGuard</h1>
      <p>Request a reset token, then create a new password for your account.</p>
    </section>

    <section class="auth-panel">
      <article class="auth-card">
        <h2>Forgot password?</h2>
        <p data-status class="status-line hidden"></p>
        <form data-endpoint="POST /auth/forgot-password">
          <label>Email<input name="email" type="email" autocomplete="email" required></label>
          <button type="button" class="secondary">Create reset token</button>
        </form>
      </article>

      <article class="auth-card">
        <h2>Reset password</h2>
        <form data-endpoint="POST /auth/reset-password" class="reset-form">
          <label>Reset token<input name="token" required></label>
          <label>New password
            <span class="password-row">
              <input name="password" type="password" autocomplete="new-password" required>
              <button type="button" class="secondary tiny" data-toggle-password>Show</button>
            </span>
          </label>
          <label>Confirm new password
            <span class="password-row">
              <input name="repeatPassword" type="password" autocomplete="new-password" required>
              <button type="button" class="secondary tiny" data-toggle-password>Show</button>
            </span>
          </label>
          <button type="button">Reset password</button>
          <div class="auth-links">
            <a class="text-link" href="login.html">Back to login</a>
            <span class="muted">New user?</span>
            <a class="text-link" href="register.html">Register</a>
          </div>
        </form>
      </article>
    </section>
  </main>
  <script src="app.js?v=7"></script>
</body>
</html>
